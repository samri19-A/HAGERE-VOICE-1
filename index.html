<!doctype html>
<html lang="am">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAGERE VOICE — የእቃ ዝርዝር ረዳት</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7b2d4e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HAGERE" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Print styles -->
    <style>
      @media print {
        .export-toolbar, .voice-panel, .chart-panel, .log-panel,
        .lang-switcher, .item-actions, .cat-select, .threshold-label { display: none !important; }
        .app { padding: 0; max-width: 100%; }
        .panel { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
        body { background: white; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register service worker for PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
